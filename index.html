<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Playlist</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .container { text-align: center; border: 1px solid #333; padding: 30px; border-radius: 15px; }
        h2 { color: #888; font-size: 16px; margin-bottom: 20px; }
        audio { filter: invert(1); width: 320px; margin: 10px 0; }
        .song-name { font-size: 14px; color: #555; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>MY PRIVATE PLAYLIST</h2>
        
        <div class="song-item">
            <audio id="audio1" src="music1.mp3" controls></audio>
            <div class="song-name">Track 01. music1.mp3</div>
        </div>

        <div class="song-item">
            <audio id="audio2" src="music2.mp3" controls></audio>
            <div class="song-name">Track 02. music2.mp3</div>
        </div>
    </div>

    <script>
        // 첫 번째 노래가 끝나면 두 번째 노래를 자동으로 틀어주는 최소한의 기능
        const a1 = document.getElementById('audio1');
        const a2 = document.getElementById('audio2');

        a1.onended = function() {
            a2.play();
        };
        a2.onended = function() {
            a1.play(); // 다시 1번으로 (무한 반복)
        };
    </script>
</body>
</html>
