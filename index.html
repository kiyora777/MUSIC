<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Playlist</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .container { text-align: center; border: 1px solid #333; padding: 40px; border-radius: 20px; background: #0a0a0a; }
        h2 { color: #666; font-size: 14px; margin-bottom: 30px; letter-spacing: 2px; }
        
        .album-art { width: 200px; height: 200px; background: #1a1a1a; margin: 0 auto 20px; border-radius: 10px; display: flex; justify-content: center; align-items: center; overflow: hidden; border: 1px solid #333; }
        .album-art img { width: 100%; height: 100%; object-fit: cover; }
        
        .song-item { margin-bottom: 30px; }
        audio { filter: invert(1); width: 320px; outline: none; }
        .song-name { font-size: 13px; color: #888; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>MY PRIVATE PLAYLIST</h2>
        
        <div class="song-item">
            <div class="album-art">
                <img src="cover1.jpg" alt="No Image">
            </div>
            <audio id="audio1" src="music1.mp3" controls loop></audio>
            <div class="song-name">Track 01. music1.mp3 (Loop ON)</div>
        </div>

        <hr style="border: 0; border-top: 1px solid #222; margin: 40px 0;">

        <div class="song-item">
            <div class="album-art">
                <img src="cover2.jpg" alt="No Image">
            </div>
            <audio id="audio2" src="music2.mp3" controls loop></audio>
            <div class="song-name">Track 02. music2.mp3 (Loop ON)</div>
        </div>
    </div>

</body>
</html>
